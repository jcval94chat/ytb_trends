name: keepalive

on:
  schedule:
    - cron: "17 3 1 * *"   # mensual, fuera del minuto 0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat
        run: |
          mkdir -p .heartbeat
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat/last-run.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .heartbeat/last-run.txt
          git commit -m "chore: keepalive" || exit 0
          git push
